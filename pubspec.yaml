name: m_auwal_store
description: Flutter mobile pharmacy app with online ordering capability
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  firebase_core: ^2.24.2
  firebase_auth: ^4.10.1
  cloud_firestore: ^4.14.0
  firebase_storage: ^11.5.0
  provider: ^6.1.0
  google_sign_in: ^6.1.5
  intl: ^0.19.0
  cached_network_image: ^3.3.1
  uuid: ^4.0.0
  badges: ^3.1.1
  animations: ^2.0.11
  lottie: ^2.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/animations/
  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600